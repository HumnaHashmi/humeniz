  <line x1="40" y1="60" x2="80" y2="60" stroke="#F2A65A" stroke-width="6" stroke-linecap="round"/>
  <circle cx="40" cy="20" r="6" fill="#F2A65A"/>
  <circle cx="80" cy="20" r="6" fill="#F2A65A"/>
  <circle cx="60" cy="60" r="9" fill="#F2A65A"/>
